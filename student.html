<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5">

    <div class="card shadow-lg p-5">

        <h2 class="text-center mb-4">
            Tell Us About Yourself
        </h2>

        <form>

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name">
            </div>

            <div class="mb-3">
                <label class="form-label">Education</label>

                <select class="form-select" id="education">
                    <option>Select</option>
                    <option>Intermediate</option>
                    <option>Diploma</option>
                    <option>B.Tech</option>
                    <option>Degree</option>
                </select>

            </div>

            <div class="mb-3">

<label class="form-label fw-bold">
Do you already know your career goal?
</label>

<div class="form-check">
<input class="form-check-input"
type="radio"
name="careerChoice"
onclick="showCareer()">

<label class="form-check-label">
✅ Yes
</label>
</div>

<div class="form-check">
<input class="form-check-input"
type="radio"
name="careerChoice"
onclick="hideCareer()">

<label class="form-check-label">
❓ No, Help Me Decide
</label>
</div>

</div>

<div class="mb-3" id="careerDiv" style="display:none;">

<label class="form-label">
Dream Career
</label>

<select class="form-select" id="career">

<option>Software Engineer</option>

<option>AI Engineer</option>

<option>Data Scientist</option>

<option>Cyber Security</option>

<option>IAS</option>

</select>

</div>

<div class="mb-3" id="interestDiv" style="display:none;">
<label class="form-label fw-bold">Select Your Interests</label>

<div class="form-check">
<input class="form-check-input" type="checkbox" value="Coding">
<label class="form-check-label">💻 Coding</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" value="AI">
<label class="form-check-label">🤖 Artificial Intelligence</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" value="Data">
<label class="form-check-label">📊 Data Science</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" value="Cyber">
<label class="form-check-label">🛡 Cyber Security</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" value="Govt">
<label class="form-check-label">🏛 Government Jobs</label>
</div>

</div>

<button
type="button"
class="btn btn-warning w-100 mt-3"
onclick="recommendCareer()">

🤖 Ask Career Genie AI

</button>

<div id="recommendationBox" class="card shadow p-4 mt-4" style="display:none;">

<h3 class="text-center text-primary">
🤖 Career Genie AI
</h3>

<p class="text-center" id="recommendationText">
Your recommendation will appear here.
</p>

<button class="btn btn-success w-100" onclick="useRecommendation()">
Use This Career
</button>

</div>

            <div class="mb-3">
                <label class="form-label">
                    Study Hours Per Day
                </label>

                <input type="number" class="form-control" id="studyHours">

            </div>

            <button
                type="button"
                class="btn btn-primary w-100"
                onclick="generateRoadmap()">
                Generate Roadmap
            </button>

        </form>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
